<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApriDex</title>
  <meta name="description" content="Una Pokédex moderna con sprites frontales y traseros." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="ball" aria-hidden="true"></div>
      <h1>ApriDex</h1>
    </div>
    <div class="controls">
      <input id="search" type="search" placeholder="Buscar por nombre o nº..." aria-label="Buscar Pokémon" />
      <select id="typeFilter" aria-label="Filtrar por tipo">
        <option value="">Todos los tipos</option>
      </select>
    </div>
  </header>

  <main>
    <section id="grid" class="grid" aria-live="polite"></section>
    <p id="empty" class="empty hidden">No se encontraron Pokémon.</p>
  </main>

  <!-- Modal con vista detallada (sprite frontal/trasero) -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div class="modal-content">
      <button class="close" id="closeModal" aria-label="Cerrar">×</button>
      <div class="modal-header">
        <span class="dex-id" id="modalId"></span>
        <h2 id="modalName"></h2>
        <div class="types" id="modalTypes"></div>
      </div>
      <div class="sprites">
        <figure>
          <img id="spriteFront" alt="" />
          <figcaption>Frente</figcaption>
        </figure>
        <figure>
          <img id="spriteBack" alt="" />
          <figcaption>Espalda</figcaption>
        </figure>
      </div>
      <div class="stats">
        <div class="stat"><span>Altura</span><strong id="modalHeight">—</strong></div>
        <div class="stat"><span>Peso</span><strong id="modalWeight">—</strong></div>
        <div class="stat"><span>Categoría</span><strong id="modalCategory">—</strong></div>
      </div>
      <p id="modalDesc" class="desc"></p>
    </div>
  </div>

  <footer class="footer">
    <small>Proximamente el juego gente - Apri</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
